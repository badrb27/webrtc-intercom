<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Call</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            /* Bright border — impossible to miss */
            border: 3px solid #00e5ff;
            border-radius: 12px;
            overflow: hidden;
            user-select: none;
            height: 100vh;
        }
        .header {
            background: #00e5ff;
            color: #000;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            -webkit-app-region: drag; /* Draggable header */
        }
        .header .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f44336;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        .content { padding: 16px; }
        .caller { font-size: 18px; font-weight: bold; color: #00e5ff; margin-bottom: 4px; }
        .status { font-size: 12px; color: #78909c; margin-bottom: 12px; }
        .timer { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 16px; }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 80px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        button:hover { opacity: 0.85; }
        .btn-hangup { background: #f44336; color: white; }
        .btn-mute { background: #37474f; color: white; }
        .btn-mute.active { background: #ff6f00; }
        .btn-camera { background: #37474f; color: white; }
        .btn-camera.active { background: #1565c0; }
        .rtc-state { font-size: 11px; color: #546e7a; margin-top: 8px; }
        video {
            width: 100%;
            border-radius: 8px;
            background: #12121e;
            display: none;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="live-indicator">
        <div class="live-dot"></div>
        <span>LIVE CALL</span>
    </div>
    <span id="timer-display">00:00</span>
</div>

<div class="content">
    <div class="caller" id="caller-name">Connecting...</div>
    <div class="status" id="rtc-state">Initializing WebRTC...</div>

    <video id="remote-video" autoplay playsinline></video>
    <audio id="remote-audio" autoplay playsinline></audio>

    <div class="controls">
        <button class="btn-mute" id="mute-btn" onclick="toggleMute()">🎤 Mic On</button>
        <button class="btn-camera" id="camera-btn" onclick="toggleCamera()">📷 Cam Off</button>
        <button class="btn-hangup" onclick="hangUp()">📵 Hang Up</button>
    </div>

    <div class="rtc-state" id="ice-state">ICE: waiting...</div>
</div>

<script>
// ── Electron IPC ──────────────────────────────────────────────────────────────
const { ipcRenderer } = require('electron');

// ── State ─────────────────────────────────────────────────────────────────────
let pc = null;             // RTCPeerConnection
let localStream = null;    // Local mic/camera stream
let callInfo = null;       // {caller, serverUrl, userId, cameraDefault, jwtToken}
let isMuted = false;
let cameraEnabled = false;
let timerInterval = null;
let callStartTime = Date.now();
let waitingForAnswer = false;  // True after offer sent, false once answer received
let lastOffer = null;          // Keep last offer SDP to resend on reconnect
let pendingCandidates = [];    // Buffer ICE candidates before answer's remote desc is set

// ── Receive call info from main process ────────────────────────────────────────
ipcRenderer.on('call-info', async (event, info) => {
    callInfo = info;
    document.getElementById('caller-name').textContent = `📞 ${info.caller}`;
    cameraEnabled = info.cameraDefault;
    updateCameraBtn();

    // Start call timer
    timerInterval = setInterval(updateTimer, 1000);

    // Start WebRTC as callee
    await initWebRTC(info.caller);
});

// ── Receive forwarded WebRTC messages from main process ───────────────────────
ipcRenderer.on('rtc-message', async (event, msg) => {
    if (msg.type === 'presence') {
        // If caller reconnected while we're still waiting for their answer, resend offer
        if (waitingForAnswer && callInfo && msg.online.includes(callInfo.caller)) {
            console.log('[WS] Caller reconnected — resending offer');
            setStatus('Caller reconnected — resending offer...');
            await resendOffer();
        }
        return;
    }

    if (!pc) return;

    if (msg.type === 'webrtc-answer') {
        waitingForAnswer = false;
        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        setStatus('Answer received — waiting for ICE...');
        // Flush any ICE candidates that arrived before the answer
        for (const c of pendingCandidates) {
            try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch (_) {}
        }
        pendingCandidates = [];
    } else if (msg.type === 'ice-candidate') {
        // Buffer if remote description not set yet
        if (!pc.remoteDescription) {
            pendingCandidates.push(msg.candidate);
            return;
        }
        try {
            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
        } catch (e) {
            console.error('ICE candidate error:', e);
        }
    }
});

// ── Initialize WebRTC ─────────────────────────────────────────────────────────
async function initWebRTC(callerUserId) {
    setStatus('Getting microphone...');

    // Create RTCPeerConnection with STUN server
    pc = new RTCPeerConnection({
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    });

    // Get local media (audio always, video if camera enabled)
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: cameraEnabled
        });
        setStatus('Mic ready. Creating offer...');
    } catch (err) {
        setStatus(`Mic error: ${err.message}`);
        return;
    }

    // Add local tracks to peer connection
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    // Listen for remote tracks (caller's audio)
    pc.ontrack = (event) => {
        const remoteAudio = document.getElementById('remote-audio');
        const remoteVideo = document.getElementById('remote-video');

        if (event.track.kind === 'audio') {
            remoteAudio.srcObject = event.streams[0];
        } else if (event.track.kind === 'video') {
            remoteVideo.srcObject = event.streams[0];
            remoteVideo.style.display = 'block';
        }
    };

    // Forward ICE candidates to caller via main process
    pc.onicecandidate = (event) => {
        if (event.candidate) {
            ipcRenderer.send('send-rtc-signal', {
                type: 'ice-candidate',
                target: callerUserId,
                candidate: event.candidate.toJSON()
            });
        }
    };

    // Track ICE connection state
    pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        document.getElementById('ice-state').textContent = `ICE: ${state}`;
        if (state === 'connected' || state === 'completed') {
            setStatus('Connected — audio active');
        } else if (state === 'failed') {
            setStatus('Connection FAILED');
        } else if (state === 'checking') {
            setStatus('Establishing connection...');
        }
    };

    // Create offer (callee creates offer in our protocol)
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    lastOffer = { type: offer.type, sdp: offer.sdp };
    waitingForAnswer = true;
    pendingCandidates = [];

    // Send offer to caller via main process -> WebSocket server -> caller
    // Use plain object — RTCSessionDescription getters are lost through Electron IPC
    ipcRenderer.send('send-rtc-signal', {
        type: 'webrtc-offer',
        target: callerUserId,
        sdp: lastOffer
    });

    setStatus('Offer sent — waiting for answer...');
}

// Resend the stored offer after caller reconnects
async function resendOffer() {
    if (!lastOffer || !callInfo) return;
    ipcRenderer.send('send-rtc-signal', {
        type: 'webrtc-offer',
        target: callInfo.caller,
        sdp: lastOffer
    });
    setStatus('Offer resent — waiting for answer...');
}

// ── Controls ──────────────────────────────────────────────────────────────────

function toggleMute() {
    isMuted = !isMuted;
    if (localStream) {
        localStream.getAudioTracks().forEach(track => {
            track.enabled = !isMuted;
        });
    }
    const btn = document.getElementById('mute-btn');
    btn.textContent = isMuted ? '🔇 Mic Off' : '🎤 Mic On';
    btn.className = isMuted ? 'btn-mute active' : 'btn-mute';
}

function toggleCamera() {
    cameraEnabled = !cameraEnabled;
    updateCameraBtn();

    if (cameraEnabled) {
        // Add video track if not already present
        navigator.mediaDevices.getUserMedia({ video: true }).then(videoStream => {
            const videoTrack = videoStream.getVideoTracks()[0];
            if (pc) {
                const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) {
                    sender.replaceTrack(videoTrack);
                } else {
                    pc.addTrack(videoTrack, localStream);
                }
            }
            localStream.addTrack(videoTrack);
        }).catch(e => {
            cameraEnabled = false;
            updateCameraBtn();
        });
    } else {
        // Remove video track
        if (localStream) {
            localStream.getVideoTracks().forEach(track => {
                track.stop();
                localStream.removeTrack(track);
            });
        }
    }
}

function updateCameraBtn() {
    const btn = document.getElementById('camera-btn');
    btn.textContent = cameraEnabled ? '📷 Cam On' : '📷 Cam Off';
    btn.className = cameraEnabled ? 'btn-camera active' : 'btn-camera';
}

function hangUp() {
    // Tell main process to send hang-up and close this window
    cleanup();
    ipcRenderer.send('hang-up');
}

function cleanup() {
    if (timerInterval) clearInterval(timerInterval);
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (pc) pc.close();
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function setStatus(text) {
    document.getElementById('rtc-state').textContent = text;
}

function updateTimer() {
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
}

// Cleanup if window is closed externally
window.addEventListener('beforeunload', cleanup);
</script>

</body>
</html>
